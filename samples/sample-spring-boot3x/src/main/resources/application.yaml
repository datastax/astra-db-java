spring:
  output:
    ansi:
      enabled: ALWAYS

server:
  port: 8081
  forward-headers-strategy: framework

logging:
  level:
    org.springframework.web: WARN
    com.ibm.astra.demo: INFO
    com.datastax.astra.client: DEBUG
    root: WARN

astra:
  data-api:
    token: ${ASTRA_DB_APPLICATION_TOKEN}
    endpoint-url: https://cad896f4-49e4-4b55-bce3-36dd290e4b9b-us-east-2.apps.astra.datastax.com
    keyspace: default_keyspace
    schema-action: CREATE_IF_NOT_EXISTS
    log-request: true

    #destination: "ASTRA"
    # Would Create the Keyspace if not exists
    options:
        # Provide API key for embedding services (OpenAI, Cohere, etc.)
        #embedding-api-key: "your-embedding-api-key-here"
        # Provide API key for reranking services
        #rerank-api-key: "your-rerank-api-key-here"

        # HTTP Client Options
        #http:
          #retry-count: 3
          #retry-delay: 100
          # HTTP protocol settings, Default: HTTP_2
          # Options for httpVersion: HTTP_1_1, HTTP_2
          #version: "HTTP_2"
          # HTTP redirect policy, Default: NORMAL
          # Options: NEVER, ALWAYS, NORMAL
          #redirect: "NORMAL"

        # HTTP Proxy configuration (optional)
        #proxy:
        #  username: "proxy-user"
        #  password: "proxy-password"
        #  hostname: "proxy.example.com"
        #  port: 8080

        # Tracking
        callers:
          - name: "sample-astra"
            version: "1.0.0"

        # Timeout Options (all values in milliseconds)
        timeout:
            # Lower level HTTP connection timeout
            # Default: 10000ms (10 seconds)
            connect: 10000
            # Lower level HTTP request timeout
            # Default: 10000ms (10 seconds)
            request: 10000
            # Data operation timeout (find*, insert*, update*, delete*)
            # Default: 30000ms (30 seconds)
            general: 30000
            # Database admin timeout (create, delete, list databases)
            # Default: 600000ms (10 minutes)
            #dbAdmin: 600000
            # Keyspace admin timeout (create, delete, list keyspaces)
            # Default: 30000ms (30 seconds)
            #keyspaceAdmin: 30000
            # Collection admin timeout (create, alter, drop collections)
            # Default: 60000ms (1 minute)
            # collectionAdmin: 60000
            # Table admin timeout (create, alter, drop tables)
            # Default: 30000ms (30 seconds)
            #tableAdmin: 30000

        # Additional headers
        #headers:
        #    db:
        #      "X-Custom-Header": "custom-value"
        #      "X-Request-ID": "request-123"
        #      "Feature-Flag-tables": "true"
        #    admin:
        #      "X-Admin-Header": "admin-value"
        #      "X-Tenant-ID": "tenant-123"

        # Observers
        #observers:
            # Built-in logging observer
        #    - type: "logging"
        #      name: "LoggingCommandObserver"
        #      enabled: true
            # Custom observer example
        #    - type: "custom"
        #      name: "MetricsObserver"
        #      className: "com.example.MetricsObserver"
        #      enabled: true

        # Serialization/Deserialization Options
 #       serdes:
          # Encode Duration objects as ISO8601 strings (Default: true)
  #        encodeDurationAsISO8601: true
          # Encode DataAPIVector objects as Base64 (Default: true)
   #       encodeDataApiVectorsAsBase64: true
